<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sample Activity 5 — Agent Chat</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; }
  #main { flex: 3; display: flex; flex-direction: column; padding: 1rem; }
  #side { flex: 1; border-left: 1px solid #ddd; padding: 1rem; overflow-y: auto; background: #fafafa; }
  #log { flex: 1; overflow-y: auto; padding-bottom: 1rem; }
  .msg { margin: .5rem 0; padding: .6rem .8rem; border-radius: 8px; max-width: 80%; white-space: pre-wrap; }
  .user { background: #dbeafe; margin-left: auto; }
  .agent { background: #f1f5f9; }
  form { display: flex; gap: .5rem; }
  input { flex: 1; padding: .6rem; border: 1px solid #ccc; border-radius: 6px; }
  button { padding: .6rem 1.2rem; border: 0; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
  .doc { border: 1px solid #e2e8f0; background: #fff; border-radius: 6px; padding: .5rem; margin-bottom: .5rem; font-size: .85rem; }
  .doc .src { color: #64748b; font-size: .75rem; }
  h3 { margin-top: 0; }
</style>
</head>
<body>
  <div id="main">
    <div id="log"></div>
    <form id="form">
      <input id="q" placeholder="Given current interest rates, should I hold BHP?" autocomplete="off">
      <button>Send</button>
    </form>
  </div>
  <div id="side"><h3>Sources</h3><div id="sources"><em>none yet</em></div></div>

<script>
const log = document.getElementById("log");
const sourcesEl = document.getElementById("sources");

function add(cls, text) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const input = document.getElementById("q");
  const question = input.value.trim() || input.placeholder;
  input.value = "";
  add("user", question);
  const agentDiv = add("agent", "");

  const resp = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: question}),
  });
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";
  for (;;) {
    const {done, value} = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, {stream: true});
    let idx;
    while ((idx = buffer.indexOf("\n\n")) >= 0) {
      const line = buffer.slice(0, idx).trim();
      buffer = buffer.slice(idx + 2);
      if (!line.startsWith("data: ")) continue;
      const frame = JSON.parse(line.slice(6));
      if (frame.type === "token") agentDiv.textContent += frame.data;
      if (frame.type === "sources") {
        sourcesEl.innerHTML = "";
        if (!frame.data.length) sourcesEl.innerHTML = "<em>none</em>";
        for (const d of frame.data) {
          const doc = document.createElement("div");
          doc.className = "doc";
          doc.innerHTML = `<b>[${d.id}]</b> ${d.text.slice(0, 160)}…<div class="src">${d.source} · score ${d.score}</div>`;
          sourcesEl.appendChild(doc);
        }
      }
      log.scrollTop = log.scrollHeight;
    }
  }
});
</script>
</body>
</html>
